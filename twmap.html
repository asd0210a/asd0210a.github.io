  width:90vw;

 }
 </style>

<body>
 <div id="map"></div>
</body>
<script>
var gjs;
var map = L.map('map').setView([23.5,120.05], 8);
/*
L.tileLayer('', {
    maxZoom: 19,
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);
*/
L.tileLayer('https://geoserver.powerby.tw/geoserver/chcg/wms?', {
    maxZoom: 19,
	layers: 'drainNEW_20250826', // ***請替換成該服務中實際的圖層名稱***
    format: 'image/png',
    transparent: true,
    version: '1.1.1',
    attribution: ''
}).addTo(map);

const highlight=(e)=>{
	e.target.setStyle({
		weight: 5,
        color: '#d61c1c',
        dashArray: '',
        fillOpacity: 0.7,
		fillColor: '#d61c1c'
	})
	e.target.bringToFront()
}
/*
Taipei county/city, Keelung, Taoyuan, Yilan: These city traffic light have a more distinct green colour then other cities, but this is not always in Yilan. https://maps.app.goo.gl/XC4sNt87UrT5vjs27

Taichung, TaoYuan : Many boxes are Dirty https://maps.app.goo.gl/JgMNXyMpQZr8DVm6A , https://maps.app.goo.gl/PzHEHPqKB5rvfrAx9

Kaohsiung, Pintung: Those cities is more commonly seeing "a plain concrete under a green box". (Maybe fake meta) https://maps.app.goo.gl/kiU4rNGRQmw88ztFA

KaohsiungCity: Rarely a small silver sticker on the box https://maps.app.goo.gl/9yQJsPiduzPvxQLR9

Hsinchu County:Blue Sticker https://maps.app.goo.gl/9kbYVX4M42CG3nd19

Hsinchu City:White Text https://maps.app.goo.gl/t3Ta9sZbnM4thvfo8

Miaoli County:Red Text https://maps.app.goo.gl/jmfzHJFgYBieC1457

Chunghua: Yellow Sticker with 04- start at 2nd line

Yunlin: Yellow Sticker with 05- start at 2nd line https://maps.app.goo.gl/X6zVpijDCW8QVY2V9

Chiayi County: Small yellow sticker with 4 lines text in a table https://maps.app.goo.gl/dbBWhmB39HQaPCXLA

Chiayu City: Pink line sticker https://maps.app.goo.gl/ShQAfjfD4sAVv5ux6

Tainan: The city has 2 major box style-
 1. A paint depicted a road with many trees nearby https://maps.app.goo.gl/MLW5X6UGJsjmQDpBA
 2. 2 yellow-black strip sticker https://maps.app.goo.gl/YfASfrNywmWukc6B9 , https://maps.app.goo.gl/X5MwZusgHaASkctg7
 


*/
const resetHighlight=(e)=>{
	gjs.resetStyle(e.target)
}
const whenClick=(e)=>{
    //console.log(e.feature.properties.COUNTYID)
}
const gc=(d)=>{
	let c
	switch(d){
		case 'A':
		case 'F':
		//case 'G':
		case 'C':
		case 'H':
			c='#1CD632';break;
		
		case 'G':
			c='#CEF2D6';break;
			
		default :
			c='#858585'
	}
return c
}
function style(feature) {
		return {
			weight: 2,
			opacity: 1,
			color: 'white',
			dashArray: '',
			fillOpacity: 0.7,
			fillColor: gc(feature.properties["COUNTYID"])
		};
	}


function onEachFeature(feature, layer) {
		layer.on({
			mouseover: highlight,
			mouseout: resetHighlight,
			click: whenClick
		});
}

	
//gjs=L.geoJson(ctm,{style:style,onEachFeature:onEachFeature}).addTo(map)

</script>
